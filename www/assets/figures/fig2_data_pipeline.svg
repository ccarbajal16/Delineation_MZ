<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 430" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1180" height="430" fill="#ffffff"/>

  <!-- Input column -->
  <text x="120" y="40" fill="#7f8c8d" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle">USER UPLOADS</text>

  <g>
    <rect x="40" y="56" width="160" height="56" rx="9" fill="#eaf4fb" stroke="#3498db"/>
    <text x="120" y="82" fill="#1a252f" font-size="12.5" font-weight="700" text-anchor="middle">Boundary</text>
    <text x="120" y="100" fill="#5d6d7e" font-size="10" text-anchor="middle">.gpkg / .shp / .geojson</text>
  </g>
  <g>
    <rect x="40" y="158" width="160" height="56" rx="9" fill="#eafaf1" stroke="#27ae60"/>
    <text x="120" y="184" fill="#1a252f" font-size="12.5" font-weight="700" text-anchor="middle">Soil raster</text>
    <text x="120" y="202" fill="#5d6d7e" font-size="10" text-anchor="middle">.tif stack (N bands)</text>
  </g>
  <g>
    <rect x="40" y="260" width="160" height="56" rx="9" fill="#fef5e7" stroke="#f39c12"/>
    <text x="120" y="286" fill="#1a252f" font-size="12.5" font-weight="700" text-anchor="middle">Points</text>
    <text x="120" y="304" fill="#5d6d7e" font-size="10" text-anchor="middle">.csv (lon/lat + vars)</text>
  </g>

  <!-- Preprocess column -->
  <text x="430" y="40" fill="#7f8c8d" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle">ALIGN &amp; EXTRACT</text>

  <g>
    <rect x="300" y="56" width="180" height="56" rx="9" fill="#ffffff" stroke="#dfe4ea"/>
    <text x="390" y="80" fill="#2c3e50" font-size="11" font-weight="600" text-anchor="middle">CRS alignment</text>
    <text x="390" y="98" fill="#7f8c8d" font-size="9.5" text-anchor="middle">reproject to raster CRS</text>
  </g>
  <g>
    <rect x="300" y="158" width="180" height="56" rx="9" fill="#ffffff" stroke="#dfe4ea"/>
    <text x="390" y="182" fill="#2c3e50" font-size="11" font-weight="600" text-anchor="middle">Crop + mask</text>
    <text x="390" y="200" fill="#7f8c8d" font-size="9.5" text-anchor="middle">raster &#8594; study area</text>
  </g>
  <g>
    <rect x="300" y="260" width="180" height="56" rx="9" fill="#ffffff" stroke="#dfe4ea"/>
    <text x="390" y="284" fill="#2c3e50" font-size="11" font-weight="600" text-anchor="middle">terra::extract</text>
    <text x="390" y="302" fill="#7f8c8d" font-size="9.5" text-anchor="middle">raster values at points</text>
  </g>

  <!-- Feature matrix -->
  <g>
    <rect x="560" y="120" width="190" height="130" rx="10" fill="#1a252f"/>
    <text x="655" y="150" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Feature matrix</text>
    <line x1="585" y1="162" x2="725" y2="162" stroke="#3a4a5a"/>
    <text x="580" y="182" fill="#d7e1ea" font-size="10">• selected soil variables</text>
    <text x="580" y="202" fill="#d7e1ea" font-size="10">• median imputation</text>
    <text x="580" y="222" fill="#d7e1ea" font-size="10">• min-max &#8594; [0,1]</text>
    <text x="580" y="242" fill="#3498db" font-size="10" font-weight="700">• PCA &#8594; PCs &#8805; 80% var</text>
  </g>

  <!-- Outputs -->
  <text x="970" y="40" fill="#7f8c8d" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle">ANALYSIS</text>
  <g>
    <rect x="850" y="100" width="240" height="74" rx="9" fill="#f4ecf7" stroke="#8e44ad"/>
    <text x="970" y="126" fill="#1a252f" font-size="12" font-weight="700" text-anchor="middle">Validation (k = 2..K)</text>
    <text x="970" y="146" fill="#5d6d7e" font-size="10" text-anchor="middle">FPI · NCE · XB · PE · FS</text>
    <text x="970" y="163" fill="#5d6d7e" font-size="10" text-anchor="middle">&#8594; optimal k</text>
  </g>
  <g>
    <rect x="850" y="196" width="240" height="74" rx="9" fill="#fdf2e9" stroke="#e67e22"/>
    <text x="970" y="222" fill="#1a252f" font-size="12" font-weight="700" text-anchor="middle">Clustering (k = optimal)</text>
    <text x="970" y="242" fill="#5d6d7e" font-size="10" text-anchor="middle">final FCM &#8594; membership U</text>
    <text x="970" y="259" fill="#5d6d7e" font-size="10" text-anchor="middle">hard zones = max.col(U)</text>
  </g>
  <g>
    <rect x="850" y="292" width="240" height="74" rx="9" fill="#e8f8f5" stroke="#16a085"/>
    <text x="970" y="318" fill="#1a252f" font-size="12" font-weight="700" text-anchor="middle">Zone maps &amp; stats</text>
    <text x="970" y="338" fill="#5d6d7e" font-size="10" text-anchor="middle">IDW surfaces · ANOVA</text>
    <text x="970" y="355" fill="#5d6d7e" font-size="10" text-anchor="middle">means per zone</text>
  </g>

  <!-- arrows inputs -> preprocess -->
  <line x1="200" y1="84" x2="298" y2="84" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="200" y1="186" x2="298" y2="186" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="200" y1="288" x2="298" y2="288" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <!-- boundary feeds crop too -->
  <path d="M200,98 C250,98 250,170 298,178" fill="none" stroke="#bdc3c7" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#ar)"/>

  <!-- preprocess -> feature matrix -->
  <path d="M480,84 C520,84 520,150 558,165" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M480,186 C520,186 520,185 558,185" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M480,288 C520,288 520,215 558,205" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- feature matrix -> analysis -->
  <path d="M750,160 C800,160 800,135 848,135" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M750,190 C800,190 800,230 848,233" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <!-- validation -> clustering -> maps -->
  <line x1="970" y1="174" x2="970" y2="194" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="970" y1="270" x2="970" y2="290" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ar)"/>

  <text x="590" y="404" fill="#95a5a6" font-size="10" text-anchor="middle">Raster values overwrite CSV values where layer names match · points read as EPSG:4326 then reprojected</text>
</svg>
